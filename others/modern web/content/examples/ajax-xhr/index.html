<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AJAX XMLHttpRequest</title>
  <link rel="icon" type="image/png" href="../../../../../favicon/MT.png" />
  <style>
    #demo {
      margin-top: 16px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: sans-serif;
    }
    button { padding: 0.5rem 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <h2>AJAX XMLHttpRequest</h2>
  <button type="button" onclick="loadAJAX()">Load Content</button>
  <div id="demo">Content will appear here…</div>
  <script>
    function loadAJAX() {
      const xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function () {
        if (this.readyState === 4 && this.status === 200) {
          document.getElementById("demo").innerHTML = this.responseText;
        }
      };
      xhttp.open("GET", "txt/ajax_info.txt", true);
      xhttp.send();
    }
  </script>
</body>
</html>
