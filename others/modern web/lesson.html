<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesson — Modern Web Resource Center</title>
  <link rel="icon" type="image/png" href="../favicon/MT.png" />
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/a11y.css">
  <link rel="stylesheet" href="css/lesson.css">
  <script src="js/a11y.js"></script>
</head>
<body>
  <a class="skip-link" href="#lesson-main">Skip to lesson content</a>
  <div class="lesson-layout">
    <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>
    <aside class="lesson-sidebar" id="lesson-sidebar">
      <h2>Lessons</h2>
      <nav id="lesson-nav" aria-label="Course navigation"></nav>
    </aside>

    <div class="lesson-main" id="lesson-main">
      <header class="lesson-header">
        <div class="lesson-title-row">
          <button
            type="button"
            class="hamburger-btn"
            id="sidebar-toggle"
            aria-expanded="false"
            aria-controls="lesson-sidebar"
            aria-label="Open lessons menu"
          >
            <span class="hamburger-icon" aria-hidden="true"></span>
          </button>
          <h1 id="lesson-title">Loading…</h1>
          <div class="lesson-header-actions">
            <div class="a11y-toolbar" role="group" aria-label="Accessibility options">
              <button type="button" class="btn btn--small a11y-btn" id="a11y-text-bigger" title="Increase text size" aria-label="Increase text size">A+</button>
              <button type="button" class="btn btn--small a11y-btn" id="a11y-text-smaller" title="Decrease text size" aria-label="Decrease text size">A−</button>
              <button type="button" class="btn btn--small a11y-btn" id="a11y-grayscale" title="Grayscale" aria-label="Toggle grayscale" aria-pressed="false">Gray</button>
              <button type="button" class="btn btn--small a11y-btn" id="a11y-reset" title="Reset to normal" aria-label="Reset accessibility settings to normal">Reset</button>
            </div>
            <a class="btn btn--small" href="index.html">All lessons</a>
          </div>
        </div>
        <p id="lesson-summary"></p>
      </header>

      <section class="lesson-section lab-grid" aria-label="Examples and practice">
        <div>
          <h2>Examples</h2>
          <div id="examples-list"></div>
        </div>
        <div class="practice-panel">
          <h2>Practice lab</h2>
          <p class="desc" id="practice-desc"></p>
          <ul class="hints-list" id="practice-hints" hidden></ul>
          <div id="practice-editor-root"></div>
          <div class="card-actions">
            <button type="button" class="btn btn--primary btn--small" id="btn-run-practice">Run</button>
            <button type="button" class="btn btn--small" id="btn-reset-practice">Reset</button>
          </div>
          <div id="practice-output"></div>
        </div>
      </section>
    </div>
  </div>

  <script src="js/content.js"></script>
  <script src="js/router.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/lesson.js"></script>
</body>
</html>
