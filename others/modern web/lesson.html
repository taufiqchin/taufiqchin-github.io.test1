<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n-title="pageTitleLesson">Module — Modern Web Resource Center</title>
  <link rel="icon" type="image/png" href="../favicon/MT.png" />
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/a11y.css">
  <link rel="stylesheet" href="css/lesson.css">
  <script src="js/i18n.js"></script>
  <script src="js/a11y.js"></script>
</head>
<body>
  <a class="skip-link" href="#lesson-main" data-i18n="skipToLesson">Skip to module content</a>
  <div class="lesson-layout">
    <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>
    <aside class="lesson-sidebar" id="lesson-sidebar">
      <h2 class="sidebar-brand">
        <a class="sidebar-home-link" href="index.html">
          <img class="sidebar-logo" src="images/Picture2.png" alt="" width="28" height="28" />
          <span data-i18n="lessonNavHome">Modern Web</span>
        </a>
      </h2>
      <nav id="lesson-nav" data-i18n-title="courseNavLabel" aria-label="Course navigation"></nav>
    </aside>

    <div class="lesson-main" id="lesson-main">
      <header class="lesson-header">
        <div class="lesson-title-row">
          <button
            type="button"
            class="hamburger-btn"
            id="sidebar-toggle"
            aria-expanded="false"
            aria-controls="lesson-sidebar"
            data-i18n-title="openMenu"
            aria-label="Open navigation menu"
          >
            <span class="hamburger-icon" aria-hidden="true"></span>
          </button>
          <h1 id="lesson-title">Loading…</h1>
          <div class="lesson-header-actions">
            <div class="lang-toggle" role="group" aria-label="Language">
              <button type="button" class="btn btn--small lang-btn active" data-lang="en" aria-pressed="true">EN</button>
              <button type="button" class="btn btn--small lang-btn" data-lang="bm" aria-pressed="false">BM</button>
            </div>
            <div class="a11y-toolbar" role="group" data-i18n-title="a11yLabel" aria-label="Accessibility options">
              <button type="button" class="btn btn--small a11y-btn" id="a11y-text-bigger" data-i18n-title="a11yBigger" title="Increase text size" aria-label="Increase text size">A+</button>
              <button type="button" class="btn btn--small a11y-btn" id="a11y-text-smaller" data-i18n-title="a11ySmaller" title="Decrease text size" aria-label="Decrease text size">A−</button>
              <button type="button" class="btn btn--small a11y-btn" id="a11y-grayscale" data-i18n-title="a11yGrayscale" title="Grayscale" aria-label="Toggle grayscale" aria-pressed="false">Gray</button>
              <button type="button" class="btn btn--small a11y-btn" id="a11y-reset" data-i18n-title="a11yReset" title="Reset to normal" aria-label="Reset accessibility settings to normal">Reset</button>
            </div>
            <a class="btn btn--small" href="index.html" data-i18n="allLessons">Modern Web home</a>
          </div>
        </div>
        <p id="lesson-summary"></p>
      </header>

      <section id="lesson-guide-section" class="lesson-section lesson-guide" hidden data-i18n-title="guideSectionLabel" aria-label="Getting started guide">
        <h2 id="lesson-guide-title"></h2>
        <p id="lesson-guide-intro" class="lesson-guide-intro"></p>
        <ol id="lesson-guide-steps" class="lesson-guide-steps"></ol>
        <p id="lesson-guide-footer" class="lesson-guide-footer"></p>
      </section>

      <section class="lesson-section" data-i18n-title="examplesSectionLabel" aria-label="Examples">
        <h2 data-i18n="examplesSection">Examples</h2>
        <div id="examples-list"></div>
      </section>

      <section class="lesson-section practice-panel" data-i18n-title="practiceSectionLabel" aria-label="Practice lab">
        <h2 data-i18n="practiceLab">Practice lab</h2>
        <p class="desc" id="practice-desc"></p>
        <ul class="hints-list" id="practice-hints" hidden></ul>
        <div class="lab-workspace">
          <div class="lab-code-col">
            <div id="practice-editor-root"></div>
            <div class="card-actions">
              <button type="button" class="btn btn--primary btn--small" id="btn-run-practice" data-i18n="runExample">Run example</button>
              <button type="button" class="btn btn--small" id="btn-reset-practice" data-i18n="reset">Reset</button>
            </div>
          </div>
          <div class="lab-output-col" id="practice-output"></div>
        </div>
      </section>
    </div>
  </div>

  <script src="js/content.js"></script>
  <script src="js/router.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/lesson.js"></script>
</body>
</html>
