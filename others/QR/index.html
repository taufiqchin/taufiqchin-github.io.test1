<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <meta name="description" content="Generate custom QR codes for URLs, WiFi, Contacts, and more with QR Craft.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <!-- QR Generator -->
        <section class="tool-section" id="qr-gen">
            <header class="header">
                <div class="logo">
                    <i data-lucide="qr-code"></i>
                    <h1>QR Code Generator</h1>
                </div>
                <p class="subtitle">Generate custom QR codes for anything</p>
            </header>

            <div class="generator-grid">
                <!-- Left Panel: Controls -->
                <div class="card controls-panel">
                    <div class="tabs-container">
                        <button class="tab-btn active" data-type="url" title="URL">
                            <i data-lucide="link"></i>
                            <span>URL</span>
                        </button>
                        <button class="tab-btn" data-type="text" title="Text">
                            <i data-lucide="type"></i>
                            <span>Text</span>
                        </button>
                    </div>

                    <div class="input-area" id="inputSection">
                        <div class="input-group active" data-content="url">
                            <label>Website URL</label>
                            <input type="url" id="urlContent" placeholder="https://example.com">
                        </div>

                        <div class="input-group" data-content="text">
                            <label>Enter Text</label>
                            <textarea id="textContent" placeholder="Type something..."></textarea>
                        </div>
                    </div>

                    <div class="customization-area">
                        <div class="option-row">
                            <div class="option">
                                <label>Foreground</label>
                                <input type="color" id="fgColor" value="#000000">
                            </div>
                            <div class="option">
                                <label>Background</label>
                                <input type="color" id="bgColor" value="#ffffff">
                            </div>
                        </div>
                        <div class="option">
                            <label>Size: <span id="sizeVal">300</span>px</label>
                            <input type="range" id="qrSize" min="100" max="1000" step="10" value="300">
                        </div>
                    </div>
                </div>

                <!-- Right Panel: Preview -->
                <div class="card preview-panel">
                    <div class="qr-container">
                        <canvas id="qrCanvas"></canvas>
                        <div class="qr-placeholder" id="qrPlaceholder">
                            <i data-lucide="qr-code" size="48"></i>
                            <p>Your QR will appear here</p>
                        </div>
                    </div>
                    <div class="actions">
                        <button id="downloadBtn" class="primary-btn">
                            <i data-lucide="download"></i>
                            Download 8K PNG
                        </button>
                        <button id="shareBtn" class="secondary-btn">
                            <i data-lucide="share-2"></i>
                            Share
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <p>&copy; 2026 QR Craft. All rights reserved.</p>
        </footer>
    </main>

    <!-- QR Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
