<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Craft | Premium QR Code Generator</title>
    <meta name="description" content="Generate custom QR codes for URLs, WiFi, Contacts, and more with QR Craft.">
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="app-container">
        <!-- QR Generator -->
        <section class="tool-section" id="qr-gen">
            <header class="header">
                <div class="logo">
                    <i data-lucide="qr-code"></i>
                    <h1>QR Craft</h1>
                </div>
                <p class="subtitle">Generate custom QR codes for anything</p>
            </header>

            <div class="generator-grid">
                <!-- Left Panel: Controls -->
                <div class="card controls-panel">
                    <div class="tabs-container">
                        <button class="tab-btn active" data-type="url" title="URL">
                            <i data-lucide="link"></i>
                            <span>URL</span>
                        </button>
                        <button class="tab-btn" data-type="text" title="Text">
                            <i data-lucide="type"></i>
                            <span>Text</span>
                        </button>
                        <button class="tab-btn" data-type="wifi" title="WiFi">
                            <i data-lucide="wifi"></i>
                            <span>WiFi</span>
                        </button>
                        <button class="tab-btn" data-type="email" title="Email">
                            <i data-lucide="mail"></i>
                            <span>Email</span>
                        </button>
                        <button class="tab-btn" data-type="phone" title="Phone">
                            <i data-lucide="phone"></i>
                            <span>Phone</span>
                        </button>
                        <button class="tab-btn" data-type="sms" title="SMS">
                            <i data-lucide="message-square"></i>
                            <span>SMS</span>
                        </button>
                        <button class="tab-btn" data-type="whatsapp" title="WhatsApp">
                            <i data-lucide="message-circle"></i>
                            <span>WhatsApp</span>
                        </button>
                        <button class="tab-btn" data-type="contact" title="VCard">
                            <i data-lucide="user"></i>
                            <span>Contact</span>
                        </button>
                    </div>

                    <div class="input-area" id="inputSection">
                        <div class="input-group active" data-content="url">
                            <label>Website URL</label>
                            <input type="url" id="urlContent" placeholder="https://example.com">
                        </div>

                        <div class="input-group" data-content="text">
                            <label>Enter Text</label>
                            <textarea id="textContent" placeholder="Type something..."></textarea>
                        </div>

                        <div class="input-group" data-content="wifi">
                            <label>Network Name (SSID)</label>
                            <input type="text" id="wifiSsid" placeholder="My WiFi">
                            <label>Password</label>
                            <input type="password" id="wifiPass" placeholder="Password">
                            <label>Encryption</label>
                            <select id="wifiEnc">
                                <option value="WPA">WPA/WPA2</option>
                                <option value="WEP">WEP</option>
                                <option value="nopass">None</option>
                            </select>
                        </div>

                        <div class="input-group" data-content="email">
                            <label>Email Address</label>
                            <input type="email" id="emailAddr" placeholder="hello@example.com">
                            <label>Subject</label>
                            <input type="text" id="emailSub" placeholder="Subject">
                            <label>Message</label>
                            <textarea id="emailBody" placeholder="Hello..."></textarea>
                        </div>

                        <div class="input-group" data-content="phone">
                            <label>Phone Number</label>
                            <input type="tel" id="phoneNumber" placeholder="+1 234 567 890">
                        </div>

                        <div class="input-group" data-content="sms">
                            <label>Phone Number</label>
                            <input type="tel" id="smsNumber" placeholder="+1 234 567 890">
                            <label>Message</label>
                            <textarea id="smsMessage" placeholder="Type your message..."></textarea>
                        </div>

                        <div class="input-group" data-content="whatsapp">
                            <label>WhatsApp Number</label>
                            <input type="tel" id="waNumber" placeholder="1234567890 (inc. country code)">
                            <label>Initial Message</label>
                            <textarea id="waMessage" placeholder="Hello..."></textarea>
                        </div>

                        <div class="input-group" data-content="contact">
                            <label>Full Name</label>
                            <input type="text" id="vName" placeholder="John Doe">
                            <label>Phone</label>
                            <input type="tel" id="vPhone" placeholder="+1 234 567 890">
                            <label>Email</label>
                            <input type="email" id="vEmail" placeholder="john@example.com">
                            <label>Organization</label>
                            <input type="text" id="vOrg" placeholder="Company Inc.">
                        </div>
                    </div>

                    <div class="customization-area">
                        <div class="option-row">
                            <div class="option">
                                <label>Foreground</label>
                                <input type="color" id="fgColor" value="#000000">
                            </div>
                            <div class="option">
                                <label>Background</label>
                                <input type="color" id="bgColor" value="#ffffff">
                            </div>
                        </div>
                        <div class="option">
                            <label>Size: <span id="sizeVal">300</span>px</label>
                            <input type="range" id="qrSize" min="100" max="1000" step="10" value="300">
                        </div>
                    </div>
                </div>

                <!-- Right Panel: Preview -->
                <div class="card preview-panel">
                    <div class="qr-container">
                        <canvas id="qrCanvas"></canvas>
                        <div class="qr-placeholder" id="qrPlaceholder">
                            <i data-lucide="qr-code" size="48"></i>
                            <p>Your QR will appear here</p>
                        </div>
                    </div>
                    <div class="actions">
                        <button id="downloadBtn" class="primary-btn">
                            <i data-lucide="download"></i>
                            Download 8K PNG
                        </button>
                        <button id="shareBtn" class="secondary-btn">
                            <i data-lucide="share-2"></i>
                            Share
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <footer class="app-footer">
            <p>&copy; 2026 QR Craft. All rights reserved.</p>
        </footer>
    </main>

    <!-- QR Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="main.js"></script>
</body>

</html>
