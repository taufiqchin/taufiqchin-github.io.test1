<!DOCTYPE html>
<html lang="en">
<title>My Research</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
<link rel="stylesheet" href="https://www.w3schools.com/lib/w3-theme-black.css"> <!-- navi and sidebar color -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<!-- https://www.algolia.com/doc/guides/building-search-ui/installation/js/ -->
<script src="https://cdn.jsdelivr.net/npm/algoliasearch@4.0.0/dist/algoliasearch-lite.umd.js"
	integrity="sha256-MfeKq2Aw9VAkaE9Caes2NOxQf6vUa8Av0JqcUXUGkd0=" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/instantsearch.js@4.0.0/dist/instantsearch.production.min.js"
	integrity="sha256-6S7q0JJs/Kx4kb/fv0oMjS855QTz5Rc2hh9AkIUjUsk=" crossorigin="anonymous"></script>


<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css"
	integrity="sha384-9aIt2nRpC12Uk9gS9baDl411NQApFmC26EwAOH8WgZl5MYYxFfc+NcPb1dKGj7Sk" crossorigin="anonymous">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="/favicon/MT.png">

<body>



	<!-- Sidebar -->
	<nav class="w3-sidebar leftnavi w3-bar-block w3-large w3-animate-left" id="mySidebar">
		<!-- Content will be loaded dynamically from sidebar.json -->
	</nav>

	<!-- Overlay effect when opening sidebar on small screens -->
	<div class="w3-overlay" onclick="w3_close()" style="cursor:pointer" title="close side menu" id="myOverlay"></div>

	<!-- ******* Main content ********* -->
	<div class="w3-main">

		<!-- Hero Section -->
		<div class="hero-section">
			<button class="w3-button w3-xlarge menu-btn" onclick="w3_open()" id="openBtn">
				<i class="fa fa-bars"></i>
			</button>
			<h1>&nbsp;&nbsp;My Research</h1>
		</div>

		<div class="w3-row-padding latest-updates-section" style="margin: 0 0%;">
			<!-- Research Content Section -->
			<div class="w3-col l12 m12 s12">
				<h2 class="section-title">Research Projects</h2>
				<div class="research-content">
					<div class="w3-twothird w3-container">
						<h3 class="w3-text-teal">Current Research</h3>
						<hr>
						<p>Explore my ongoing research projects and academic work.</p>

						<ul id="research-projects-list">
							<!-- Dynamically filled from research.json -->
						</ul>
					</div>
				</div>
			</div>
		</div>

		<hr>

		<footer class="main-footer" style="margin: 0 36px;"></footer>

		<!-- END MAIN -->
	</div>

	<script src="scriptss.js"></script>

</body>

</html>
